syntax = "proto3";

package invoker_api;
option go_package = "./api";

import "google/protobuf/struct.proto";

service AdminService {
  rpc GetSites(GetSitesRequest) returns (GetSitesResponse);
  rpc AddSite(AddSiteRequest) returns (AddSiteResponse);
  rpc EditSite(EditSiteRequest) returns (EditSiteResponse);
  rpc DeleteSite(DeleteSiteRequest) returns (DeleteSiteResponse);
  rpc GetSiteAdmins(GetSiteAdminsRequest) returns (GetSiteAdminsResponse);
  rpc AddSiteAdmin(AddSiteAdminRequest) returns (AddSiteAdminResponse);
  rpc DeleteSiteAdmin(DeleteSiteAdminRequest) returns (DeleteSiteAdminResponse);
  rpc GetStorageInfo(GetStorageInfoRequest) returns (GetStorageInfoResponse);
}

service SiteService {
  rpc GetSiteList(GetSiteListRequest) returns (GetSiteListResponse);
  rpc GetSite(GetSiteRequest) returns (GetSiteResponse);
  rpc GetCategoryList(GetCategoryListRequest) returns (GetCategoryListResponse);
  rpc GetCategory(GetCategoryRequest) returns (GetCategoryResponse);
  rpc AddCategory(AddCategoryRequest) returns (AddCategoryResponse);
  rpc EditCategory(EditCategoryRequest) returns (EditCategoryResponse);
  rpc DeleteCategory(DeleteCategoryRequest) returns (DeleteCategoryResponse);
  rpc GetPostList(GetPostListRequest) returns (GetPostListResponse);
  rpc GetPostDetail(GetPostDetailRequest) returns (GetPostDetailResponse);
  rpc AddPost(AddPostRequest) returns (AddPostResponse);
  rpc EditPost(EditPostRequest) returns (EditPostResponse);
  rpc DeletePost(DeletePostRequest) returns (DeletePostResponse);
  rpc GetComments(GetCommentsRequest) returns (GetCommentsResponse);
  rpc AddComment(AddCommentRequest) returns (AddCommentResponse);
  rpc EditComment(EditCommentRequest) returns (EditCommentResponse);
  rpc DeleteComment(DeleteCommentRequest) returns (DeleteCommentResponse);
  rpc AggregatedSitePage(AggregatedSitePageRequest) returns (AggregatedSitePageResponse);
  rpc AggregatedCategoryPage(AggregatedCategoryPageRequest) returns (AggregatedCategoryPageResponse);
  rpc AggregatedPostPage(AggregatedPostPageRequest) returns (AggregatedPostPageResponse);
  rpc AggregatedSearchPage(AggregatedSearchPageRequest) returns (AggregatedSearchPageResponse);
  rpc SearchPostComment(SearchPostCommentRequest) returns (SearchPostCommentResponse);
}

service UserService {
  rpc ThumbupPost(ThumbupPostRequest) returns (ThumbupPostResponse);
  rpc ThumbupComment(ThumbupCommentRequest) returns (ThumbupCommentResponse);
  rpc PostHistory(PostHistoryRequest) returns (PostHistoryResponse);
  rpc CommentHistory(CommentHistoryRequest) returns (CommentHistoryResponse);
  rpc ThumbupHistory(ThumbupHistoryRequest) returns (ThumbupHistoryResponse);
}

message GetSitesRequest {
  string apiKey = 1; // @gotags: validate:"required"
}

message GetSitesResponse {
  int32 code = 1;
  string message = 2;
  google.protobuf.Value debugMessage = 3;
  string oracle = 4;
  message SiteInfo {
    int64 id = 1;
    string name = 2;
  }
  message Data {
    repeated SiteInfo list = 1;
  }
  Data data = 5;
}

