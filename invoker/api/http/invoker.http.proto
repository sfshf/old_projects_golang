  google.protobuf.Value debugMessage = 3;
  string oracle = 4;
  message PostInfo {
    int64 id = 1;
    string title = 2;
    int64 postedAt = 3;
    int64 postedBy = 4;
    string postedByString = 5;
    string content = 6;
    string image = 7;
    int32 state = 8;
    int64 views = 9;
    int64 replies = 10;
    int64 activity = 11;
    repeated CommentInfo comments = 12;
    int64 commentTotal = 13;
    int64 thumbups = 14;
    bool thumbup = 15;
  }
  message CommentInfo {
    int64 id = 1;
    int64 postID = 2;
    int64 rootCommentID = 3;
    int64 postedAt = 4;
    int64 postedBy = 5;
    string postedByString = 6;
    int64 atWho = 7;
    string atWhoString = 8;
    string content = 9;
    int64 replies = 10;
    int64 thumbups = 11;
    bool thumbup = 12;
  }
