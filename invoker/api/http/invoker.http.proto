syntax = "proto3";

package invoker_api;

import "google/api/annotations.proto";
import "google/protobuf/struct.proto";

service AdminService {
  rpc GetSites(GetSitesRequest) returns (GetSitesResponse) {
      option (google.api.http) = {
          post: "/invoker/admin/getSites/v1"
          body: "*"
      };
  };
  rpc AddSite(AddSiteRequest) returns (AddSiteResponse) {
      option (google.api.http) = {
          post: "/invoker/admin/addSite/v1"
          body: "*"
      };
  };
  rpc EditSite(EditSiteRequest) returns (EditSiteResponse) {
      option (google.api.http) = {
          post: "/invoker/admin/editSite/v1"
          body: "*"
      };
  };
  rpc DeleteSite(DeleteSiteRequest) returns (DeleteSiteResponse) {
      option (google.api.http) = {
          post: "/invoker/admin/deleteSite/v1"
          body: "*"
      };
  };
  rpc GetSiteAdmins(GetSiteAdminsRequest) returns (GetSiteAdminsResponse) {
      option (google.api.http) = {
          post: "/invoker/admin/getSiteAdmins/v1"
          body: "*"
      };
  };
  rpc AddSiteAdmin(AddSiteAdminRequest) returns (AddSiteAdminResponse) {
      option (google.api.http) = {
          post: "/invoker/admin/addSiteAdmin/v1"
          body: "*"
      };
  };
  rpc DeleteSiteAdmin(DeleteSiteAdminRequest) returns (DeleteSiteAdminResponse) {
      option (google.api.http) = {
          post: "/invoker/admin/deleteSiteAdmin/v1"
          body: "*"
      };
  };
  rpc GetStorageInfo(GetStorageInfoRequest) returns (GetStorageInfoResponse) {
      option (google.api.http) = {
          post: "/invoker/admin/getStorageInfo/v1"
          body: "*"
      };
  };
}

