message GetLatestSpotPriceRequest {
  string symbol = 1;
  string baseCoin = 2;
}

message GetLatestSpotPriceResponse {
  int32 code = 1;
  string message = 2;
  google.protobuf.Value debugMessage = 3;
  string oracle = 4;
  message Data {
    string price = 1;
  }
  Data data = 5;
}

message GetLatestSpotPricesRequest {
  repeated string symbols = 1;
  string baseCoin = 2;
}

message GetLatestSpotPricesResponse {
  int32 code = 1;
  string message = 2;
  google.protobuf.Value debugMessage = 3;
  string oracle = 4;
  message Data {
    repeated string list = 1;
  }
  Data data = 5;
}

message GetAssetsRequest {
  string address = 1;
  string chain = 2;
}

message GetAssetsResponse {
  int32 code = 1;
  string message = 2;
  google.protobuf.Value debugMessage = 3;
  string oracle = 4;
  message Token {
    string balance = 1;
    string address = 2;
    string name = 3;
    string symbol = 4;
    google.protobuf.Value price = 5;
    google.protobuf.Value value = 6;
  }
  message UnknownToken {
    string balance = 1;
    string address = 2;
  }
  message Balance {
    string balance = 1;
    string price = 2;
    string value = 3;
  }
  message DappAsset {
    string app = 1;
    string value = 2;
  }
  message Data {
    google.protobuf.Value toBlock = 1;
    repeated Token tokens = 2;
    repeated UnknownToken unknownTokens = 3;
    Balance balance = 4;
    repeated DappAsset dappAssets = 5;
    string totalValue = 6;
  }
  Data data = 5;
}


message GetUIKlinesRequest {
  string interval = 1;
  int64 beginTime = 2;
  int64 endTime = 3;
  string baseCoin = 4;
  string symbol = 5;
}

message GetUIKlinesResponse {
  int32 code = 1;
  string message = 2;
  google.protobuf.Value debugMessage = 3;
  string oracle = 4;
  message Price {
    string openPrice = 1;
    string closePrice = 2;
    string highPrice = 3;
    string lowPrice = 4;
    int64 openTime = 5;
    int64 closeTime = 6;
  }
  message Data {
    repeated Price list = 1;
  }
  Data data = 5;
}

message GetDappAssetsRequest {
  string app = 1;
  string chain = 2; 
  string address = 3; 
}

message GetDappAssetsResponse {
  int32 code = 1;
  string message = 2;
  google.protobuf.Value debugMessage = 3;
  string oracle = 4;
  message Holding {
    string token = 1;
    string amount = 2;
    string price = 3;
    string value = 4;
  }
  message Asset {
    string name = 1;
    string tokenAddress = 2;
    string totalValue = 3;
    repeated Holding holdings = 4;
  }
  message Reward {
    string token = 1;
    string amount = 2;
    string price = 3;
    string value = 4;
  }
  message Data {
    repeated Asset assets = 1;
    repeated Asset debts = 2;
    repeated Reward rewards = 3;
    string totalValue = 4;
  }
  Data data = 5;
}

