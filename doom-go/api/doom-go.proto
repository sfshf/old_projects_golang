syntax = "proto3";

package doom_api;
option go_package = "./api";

import "google/protobuf/struct.proto";

service DoomService {
  rpc CreateSecurityQuestions(CreateSecurityQuestionsRequest) returns (CreateSecurityQuestionsResponse);
  rpc ListSecurityQuestions(ListSecurityQuestionsRequest) returns (ListSecurityQuestionsResponse);
  rpc GetSecurityQuestions(GetSecurityQuestionsRequest) returns (GetSecurityQuestionsResponse);
  rpc DeleteSecurityQuestions(DeleteSecurityQuestionsRequest) returns (DeleteSecurityQuestionsResponse);
  rpc CreateData(CreateDataRequest) returns (CreateDataResponse);
  rpc ListData(ListDataRequest) returns (ListDataResponse);
  rpc GetData(GetDataRequest) returns (GetDataResponse);
  rpc DeleteData(DeleteDataRequest) returns (DeleteDataResponse);
  rpc GetLatestSpotPrice(GetLatestSpotPriceRequest) returns (GetLatestSpotPriceResponse);
  rpc GetLatestSpotPrices(GetLatestSpotPricesRequest) returns (GetLatestSpotPricesResponse);
  rpc GetAssets(GetAssetsRequest) returns (GetAssetsResponse);
  rpc GetUIKlines(GetUIKlinesRequest) returns (GetUIKlinesResponse);
  rpc GetDappAssets(GetDappAssetsRequest) returns (GetDappAssetsResponse);
  rpc GetTokens(GetTokensRequest) returns (GetTokensResponse);
  rpc GetDapps(GetDappsRequest) returns (GetDappsResponse);
  rpc FavoriteToken(FavoriteTokenRequest) returns (FavoriteTokenResponse);
  rpc GetFavoritedTokens(GetFavoritedTokensRequest) returns (GetFavoritedTokensResponse);
  rpc GetFavoritedLatestSpotPrices(GetFavoritedLatestSpotPricesRequest) returns (GetFavoritedLatestSpotPricesResponse);
  rpc GetTokenBalances(GetTokenBalancesRequest) returns (GetTokenBalancesResponse);
  rpc GetBalance(GetBalanceRequest) returns (GetBalanceResponse);
  rpc GetABI(GetABIRequest) returns (GetABIResponse);
  rpc GetTokenApprovals(GetTokenApprovalsRequest) returns (GetTokenApprovalsResponse);
  rpc GetAddress(GetAddressRequest) returns (GetAddressResponse);
  rpc GetAddressTransactions(GetAddressTransactionsRequest) returns (GetAddressTransactionsResponse);
  rpc GetAddressTransactionsMempool(GetAddressTransactionsMempoolRequest) returns (GetAddressTransactionsMempoolResponse);
  rpc GetGasFee(GetGasFeeRequest) returns (GetGasFeeResponse);
  rpc GetEstimationOfConfirmationTime(GetEstimationOfConfirmationTimeRequest) returns (GetEstimationOfConfirmationTimeResponse);

  rpc CreatePrivateKeyBackup(CreatePrivateKeyBackupRequest) returns (CreatePrivateKeyBackupResponse);
  rpc ListPrivateKeyBackup(ListPrivateKeyBackupRequest) returns (ListPrivateKeyBackupResponse);
  rpc GetPrivateKeyBackup(GetPrivateKeyBackupRequest) returns (GetPrivateKeyBackupResponse);
  rpc DeletePrivateKeyBackup(DeletePrivateKeyBackupRequest) returns (DeletePrivateKeyBackupResponse);
}

message CreateSecurityQuestionsRequest {
  string plainText = 1; // @gotags: validate:"required"
  string cipherText = 2; // @gotags: validate:"required"
  string title = 3; // @gotags: validate:"required"
  string description = 4; // @gotags: validate:"required"
}

message CreateSecurityQuestionsResponse {
  int32 code = 1;
  string message = 2;
  google.protobuf.Value debugMessage = 3;
  string oracle = 4;
}

message ListSecurityQuestionsRequest {
  
}

message ListSecurityQuestionsResponse {
  int32 code = 1;
  string message = 2;
  google.protobuf.Value debugMessage = 3;
  string oracle = 4;
  message ListItem {
    string title = 1;
    string dataID = 2;
    string description = 3;
    string date = 4;
  }
  message Data {
    repeated ListItem list = 1;
  }
  Data data = 5;
}

message GetSecurityQuestionsRequest {
  string title = 1; // @gotags: validate:"required"
}

message GetSecurityQuestionsResponse {
  int32 code = 1;
  string message = 2;
  google.protobuf.Value debugMessage = 3;
  string oracle = 4;
  message Data {
    string plainText = 1;
  }
  Data data = 5;
}

message DeleteSecurityQuestionsRequest {
  string title = 1; // @gotags: validate:"required"
}

message DeleteSecurityQuestionsResponse {
  int32 code = 1;
  string message = 2;
  google.protobuf.Value debugMessage = 3;
  string oracle = 4;
}

