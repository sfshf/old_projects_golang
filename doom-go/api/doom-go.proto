message GetAddressRequest {
  string address = 1; // @gotags: validate:"required"
}

message GetAddressResponse {
  int32 code = 1;
  string message = 2;
  google.protobuf.Value debugMessage = 3;
  string oracle = 4;
  message ChainStats {
    int32 fundedTxoCount = 1;
    int64 fundedTxoSum = 2;
    int32 spentTxoCount = 3;
    int64 spentTxoSum = 4;
    int64 txCount = 5;
  }
  message MempoolStats {
    int32 fundedTxoCount = 1;
    int64 fundedTxoSum = 2;
    int32 spentTxoCount = 3;
    int64 spentTxoSum = 4;
    int32 txCount = 5;
  }
  message Data {
    string address = 1;
    ChainStats chainStats = 2;
    MempoolStats mempoolStats = 3;
  }
  Data data = 5;
}

message GetAddressTransactionsRequest {
  string address = 1; // @gotags: validate:"required"
}

message GetAddressTransactionsResponse {
  int32 code = 1;
  string message = 2;
  google.protobuf.Value debugMessage = 3;
  string oracle = 4;
  message Prevout {
    string scriptpubkey = 1;
    string scriptpubkeyAsm = 2;
    string scriptpubkeyType = 3;
    string scriptpubkeyAddress = 4;
    int32 value = 5;
  }
  message Vin {
    string txID = 1;
    int32 vout = 2;
    Prevout prevout = 3;
    string scriptsig = 4;
    string scriptsigAsm = 5;
    repeated string witness = 6;
    bool isCoinbase = 7;
    int64 sequence = 8;
  }
  message Vout {
    string scriptpubkey = 1;
    string scriptpubkeyAsm = 2;
    string scriptpubkeyType = 3;
    string scriptpubkeyAddress = 4;
    int32 value = 5;
  }
  message Status {
    bool confirmed = 1;
    int32 blockHeight = 2;
    string blockHash = 3;
    int64 blockTime = 4;
  }
  message Transaction {
    string txID = 1;
    int32 version = 2;
    int32 locktime = 3;
    repeated Vin vin = 4;
    repeated Vout vout = 5;
    int32 size = 6;
    int32 weight = 7; 
    int32 fee = 8;
    Status status = 9;
  }
  message Data {
    repeated Transaction list = 1;
  }
  Data data = 5;
}

