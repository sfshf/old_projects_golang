message GetLatestSpotPriceRequest {
  string symbol = 1; // @gotags: validate:"required"
  string baseCoin = 2; // @gotags: validate:"oneof=USDT USD"
}

message GetLatestSpotPriceResponse {
  int32 code = 1;
  string message = 2;
  google.protobuf.Value debugMessage = 3;
  string oracle = 4;
  message Data {
    string price = 1;
  }
  Data data = 5;
}

message GetLatestSpotPricesRequest {
  repeated string symbols = 1; // @gotags: validate:"gt=0"
  string baseCoin = 2; // @gotags: validate:"oneof=USDT USD"
}

message GetLatestSpotPricesResponse {
  int32 code = 1;
  string message = 2;
  google.protobuf.Value debugMessage = 3;
