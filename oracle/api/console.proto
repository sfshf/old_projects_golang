syntax = "proto3";

package console_api;
option go_package = "./api/console";

import "google/protobuf/struct.proto";

service ConsoleService {
  rpc RegisterGatewayNode(RegisterGatewayNodeRequest) returns (RegisterGatewayNodeResponse);
  rpc UpsertService(UpsertServiceRequest) returns (UpsertServiceResponse);
}

message RegisterGatewayNodeRequest {
  string name = 1; // @gotags: validate:"required"
  string ipv4 = 2; // @gotags: validate:"required"
  int32 rpcPort = 3; // @gotags: validate:"gt=0"
}

message RegisterGatewayNodeResponse {
  int32 code = 1;
  string message = 2;
  google.protobuf.Value debugMessage = 3;
}

message UpsertServiceRequest {
  string name = 1; // @gotags: validate:"required"
  string application = 2; // @gotags: validate:"required"
  string url = 3; // @gotags: validate:""
  string pathPrefix = 4; // @gotags: validate:"required"
  string protoFile = 5; // @gotags: validate:"required"
}

message UpsertServiceResponse {
  int32 code = 1;
  string message = 2;
  google.protobuf.Value debugMessage = 3;
}
