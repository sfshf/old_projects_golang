syntax = "proto3";

package slark_api;
option go_package = "./api";

import "google/protobuf/struct.proto";

service UserService {
    rpc LoginByPhone(PhoneLoginRequest) returns (LoginResponse);
    rpc LoginByEmail(EmailLoginRequest) returns (LoginResponse);
    rpc LoginBySession(Empty) returns (LoginResponse);
    rpc LoginByApple(LoginByAppleRequest) returns (LoginResponse);
    rpc RegisterByEmail(RegisterByEmailRequest) returns (LoginResponse);
    rpc RegisterByEmailCaptcha(RegisterByEmailCaptchaRequest) returns (LoginResponse);
    rpc SendRegistrationEmailCaptcha(SendRegistrationEmailCaptchaRequest) returns (SendRegistrationEmailCaptchaResponse);
    rpc LogOutBySession(Empty) returns (EmptyResponse);
    rpc CheckLogin(Empty) returns (EmptyResponse);
    rpc LoginInfo(Empty) returns (LoginResponse);
    rpc QRLogin(QRLoginRequest) returns (QRLoginResponse);
    rpc SendLoginEmailCode(SendLoginEmailCodeRequest) returns (SendLoginEmailCodeResponse);
    rpc LoginByEmailCode(LoginByEmailCodeRequest) returns (LoginResponse);
    rpc UpdateNickname(UpdateNicknameRequest) returns (UpdateNicknameResponse);
    rpc Unregister(Empty) returns (UnregisterResponse);
    rpc RandomNickname(Empty) returns (RandomNicknameResponse);
    rpc GetUserInfo(GetUserInfoRequest) returns (GetUserInfoResponse);
    rpc ValidateUserIDs(ValidateUserIDsRequest) returns (ValidateUserIDsResponse);
    rpc CheckRegistration(CheckRegistrationRequest) returns (CheckRegistrationResponse);
    rpc CreateSecondaryPassword(CreateSecondaryPasswordRequest) returns (EmptyResponse);
    rpc UpdateSecondaryPassword(UpdateSecondaryPasswordRequest) returns (EmptyResponse);
    rpc LoginBySecondaryPassword(LoginBySecondaryPasswordRequest) returns (LoginResponse);
}

service TestService {
    rpc GetRegistrationEmailCaptchas(Empty) returns (GetRegistrationEmailCaptchasResponse);
    rpc GetLoginEmailCaptchas(Empty) returns (GetLoginEmailCaptchasResponse);
}

message LoginBySecondaryPasswordRequest {
    string email = 1; // @gotags: validate:"required"
    string passwordHash = 2; // @gotags: validate:"required"
}

message UpdateSecondaryPasswordRequest {
    string oldPasswordHash = 1; // @gotags: validate:"required"
    string newPasswordHash = 2;
}

message CreateSecondaryPasswordRequest {
    string passwordHash = 1; // @gotags: validate:"required"
}

message CheckRegistrationRequest {
    string email = 1;
}

message CheckRegistrationResponse {
    int32 code = 1;
    string message = 2;
    google.protobuf.Value debugMessage = 3;
    string oracle = 4;
    message Data {
        int64 id = 1;
        string nickname = 2;
    }
    Data data = 5;
}

message ValidateUserIDsRequest {
    repeated int64 userIDs = 1;
}

message ValidateUserIDsResponse {
    int32 code = 1;
    string message = 2;
    google.protobuf.Value debugMessage = 3;
    string oracle = 4;
    message Data {
        repeated bool list = 1;
    }
    Data data = 5;
}

message GetUserInfoRequest {
    int64 id = 1; // @gotags: validate:"required"
}

message GetUserInfoResponse {
    int32 code = 1;
    string message = 2;
    google.protobuf.Value debugMessage = 3;
    string oracle = 4;
    message Data {
        int64 id = 1;
        string nickname = 2;
        string email = 3;
    }
    Data data = 5;
}

message Empty {
}

message EmptyResponse {
    int32 code = 1;
    string message = 2;
    google.protobuf.Value debugMessage = 3;
    string oracle = 4;
}

message PhoneLoginRequest {
    string phone = 1; // @gotags: validate:"required"
    string passwordHash = 2; // @gotags: validate:"required"
}

message EmailLoginRequest {
    string email = 1; // @gotags: validate:"required"
    string passwordHash = 2; // @gotags: validate:"required"
}

message LoginResponse {
    int32 code = 1;
    string message = 2;
    google.protobuf.Value debugMessage = 3;
    string oracle = 4;
    message Data {
        int64 userID = 1;
        string nickname = 2;
        string email = 3;
        string phone = 4;
    }
    Data data = 5;
}

message RegisterByEmailRequest {
    string email = 1; // @gotags: validate:"required"
    string nickname = 2; // @gotags: validate:"required"
    string passwordHash = 3; // @gotags: validate:"required"
    string captcha = 4; // @gotags: validate:"required"
}

message RegisterByEmailCaptchaRequest {
    string email = 1; // @gotags: validate:"required"
    string captcha = 2; // @gotags: validate:"required"
}

message LoginByAppleRequest {
    string email = 1; // @gotags: validate:"required"
    string userIdentifier = 2; // @gotags: validate:"required"
}

message SendRegistrationEmailCaptchaRequest {
  string email = 1; // @gotags: validate:"required"
}

message SendRegistrationEmailCaptchaResponse {
  int32 code = 1;
  string message = 2;
  google.protobuf.Value debugMessage = 3;
  string oracle = 4;
}

message QRLoginRequest {
    string token = 1; // @gotags: validate:"required"
}

message QRLoginResponse {
    int32 code = 1;
    string message = 2;
    google.protobuf.Value debugMessage = 3;
    string oracle = 4;
}

message SendLoginEmailCodeRequest {
    string email = 1; // @gotags: validate:"required"
}

message SendLoginEmailCodeResponse {
    int32 code = 1;
    string message = 2;
    google.protobuf.Value debugMessage = 3;
    string oracle = 4;
}

message LoginByEmailCodeRequest {
    string email = 1; // @gotags: validate:"required"
    string code = 2; // @gotags: validate:"required"
}

message UpdateNicknameRequest {
    string nickname = 1; // @gotags: validate:"required"
}

message UpdateNicknameResponse {
    int32 code = 1;
    string message = 2;
    google.protobuf.Value debugMessage = 3;
    string oracle = 4;
}

message UnregisterResponse {
    int32 code = 1;
    string message = 2;
    google.protobuf.Value debugMessage = 3;
    string oracle = 4;
}

message RandomNicknameResponse {
    int32 code = 1;
    string message = 2;
    google.protobuf.Value debugMessage = 3;
    string oracle = 4;
    message Data {
        string nickname = 1;
    }
    Data data = 5;
}

message GetRegistrationEmailCaptchasResponse {
    int32 code = 1;
    string message = 2;
    google.protobuf.Value debugMessage = 3;
    string oracle = 4;
    message EmailCaptcha {
        string email = 1;
        string code = 2;
    }
    message Data {
        repeated EmailCaptcha list = 1;
    }
    Data data = 5;
}

message GetLoginEmailCaptchasResponse {
    int32 code = 1;
    string message = 2;
    google.protobuf.Value debugMessage = 3;
    string oracle = 4;
    message EmailCaptcha {
        string email = 1;
        string code = 2;
    }
    message Data {
        repeated EmailCaptcha list = 1;
    }
    Data data = 5;
}