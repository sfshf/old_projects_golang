syntax = "proto3";

package slark_api;
option go_package = "./api";

import "google/protobuf/struct.proto";

// device
service DeviceService {

    rpc UploadDeviceInfo(DeviceRequest) returns (DeviceEmptyResponse);
}

message DeviceEmptyResponse {
    int32 code = 1;
    string message = 2;
    google.protobuf.Value debugMessage = 3;
}


message DeviceRequest {
    string deviceID = 1;
    string platform = 2;
    string deviceModel = 3;
    int32 resolutionWidth = 4;
    int32 resolutionHeight = 5;
    float screenDensity = 6;
    float rom = 7;
    float ram = 8;
}

