  int32 code = 1;
  string message = 2;
  google.protobuf.Value debugMessage = 3;
  string oracle = 4;
  message Member {
    int64 userID = 1;
    string email = 2;
  }
  message Data {
    bool nullBackup = 1;
    bool canRecover = 2;
    int64 lastRecoveredAt = 3;
    int64 nextRecoverTS = 4;
    bool canFamilyRecover = 5;
    int64 lastFamilyRecoveredAt = 6;
    int64 nextFamilyRecoverTS = 7;
    repeated Member backupMembers = 8;
  }
  Data data = 5;
}

