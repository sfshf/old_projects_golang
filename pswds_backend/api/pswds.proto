    string dataID = 1; // @gotags: validate:"required"
    int64 updatedAt = 2; // @gotags: validate:"gt=0"
    string content = 3; // @gotags: validate:"required"
  }
  repeated PasswordDTO pwdList = 3;
  message NonPasswordDTO {
    string dataID = 1; // @gotags: validate:"required"
    int64 updatedAt = 2; // @gotags: validate:"gt=0"
    string type = 3; // @gotags: validate:"oneof='identity' 'credit card' 'bank account' 'driver license' 'passport'"
    string content = 4; // @gotags: validate:"required"
  }
  repeated NonPasswordDTO nprList = 4;
  string userPublicKey = 5; // @gotags: validate:"required"
  string encryptedFamilyKey = 6;
}

