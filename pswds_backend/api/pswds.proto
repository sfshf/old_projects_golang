syntax = "proto3";

package pswds_api;
option go_package = "./api";

import "google/protobuf/struct.proto";

service PasswordService {
  rpc CheckUpdates(CheckUpdatesRequest) returns (CheckUpdatesResponse);
  rpc UploadData(UploadDataRequest) returns (UploadDataResponse);
  rpc DownloadData(DownloadDataRequest) returns (DownloadDataResponse);
  rpc CreatePasswordRecord(CreatePasswordRecordRequest) returns (CreatePasswordRecordResponse);
  rpc UpdatePasswordRecord(UpdatePasswordRecordRequest) returns (UpdatePasswordRecordResponse);
  rpc DeletePasswordRecord(DeletePasswordRecordRequest) returns (DeletePasswordRecordResponse);
  rpc GetAirdropID(GetAirdropIDRequest) returns (GetAirdropIDResponse);
  rpc RequestAirdropData(RequestAirdropDataRequest) returns (RequestAirdropDataResponse);
  rpc UploadAirdropData(UploadAirdropDataRequest) returns (UploadAirdropDataResponse);
  rpc UploadSecurityQuestions(UploadSecurityQuestionsRequest) returns (UploadSecurityQuestionsResponse);
  rpc RecoverUnlockPassword(RecoverUnlockPasswordRequest) returns (RecoverUnlockPasswordResponse);
  rpc CreateTrustedContact(CreateTrustedContactRequest) returns (CreateTrustedContactResponse);
  rpc GetTrustedContacts(GetTrustedContactsRequest) returns (GetTrustedContactsResponse);
  rpc DeleteTrustedContact(DeleteTrustedContactRequest) returns (DeleteTrustedContactResponse);
  rpc GetBackupCiphertext(GetBackupCiphertextRequest) returns (GetBackupCiphertextResponse);
  rpc GetPrivacyEmails(GetPrivacyEmailsRequest) returns (GetPrivacyEmailsResponse);
  rpc GetPrivacyEmail(GetPrivacyEmailRequest) returns (GetPrivacyEmailResponse);
  rpc DeletePrivacyEmail(DeletePrivacyEmailRequest) returns (DeletePrivacyEmailResponse);
  rpc AddPrivacyEmailAccount(AddPrivacyEmailAccountRequest) returns (AddPrivacyEmailAccountResponse);
  rpc CreateNonPasswordRecord(CreateNonPasswordRecordRequest) returns (CreateNonPasswordRecordResponse);
  rpc UpdateNonPasswordRecord(UpdateNonPasswordRecordRequest) returns (UpdateNonPasswordRecordResponse);
  rpc DeleteNonPasswordRecord(DeleteNonPasswordRecordRequest) returns (DeleteNonPasswordRecordResponse);
  rpc DownloadSharedData(DownloadSharedDataRequest) returns (DownloadSharedDataResponse);
  rpc CreateFamily(CreateFamilyRequest) returns (CreateFamilyResponse);
  rpc GetFamilyInfo(GetFamilyInfoRequest) returns (GetFamilyInfoResponse);
  rpc CheckUserAvailable(CheckUserAvailableRequest) returns (CheckUserAvailableResponse);
  rpc InviteFamilyMember(InviteFamilyMembersRequest) returns (InviteFamilyMemberResponse);
  rpc CheckFamilyInvitation(CheckFamilyInvitationRequest) returns (CheckFamilyInvitationResponse);
  rpc ProcessFamilyInvitation(ProcessFamilyInvitationRequest) returns (ProcessFamilyInvitationResponse);
  rpc RemoveFamilyMember(RemoveFamilyMemberRequest) returns (RemoveFamilyMemberResponse);
  rpc LeaveFamily(LeaveFamilyRequest) returns (LeaveFamilyResponse);
  rpc ShareDataToFamily(ShareDataToFamilyRequest) returns (ShareDataToFamilyResponse);
  rpc ManageSharingData(ManageSharingDataRequest) returns (ManageSharingDataResponse);
  rpc HandleAdminAuthority(HandleAdminAuthorityRequest) returns (HandleAdminAuthorityResponse);
  rpc RemoveFamily(RemoveFamilyRequest) returns (RemoveFamilyResponse);
  rpc GetFamilyMessages(GetFamilyMessagesRequest) returns (GetFamilyMessagesResponse);
  rpc GetFamilyBackups(GetFamilyBackupsRequest) returns (GetFamilyBackupsResponse);
  rpc SetFamilyBackup(SetFamilyBackupRequest) returns (SetFamilyBackupResponse);
  rpc RequestFamilyRecover(RequestFamilyRecoverRequest) returns (RequestFamilyRecoverResponse);
  rpc HelpFamilyRecover(HelpFamilyRecoverRequest) returns (HelpFamilyRecoverResponse);
  rpc RejectFamilyRecover(RejectFamilyRecoverRequest) returns (RejectFamilyRecoverResponse);
  rpc GetFamilyBackupRecovers(GetFamilyBackupRecoversRequest) returns (GetFamilyBackupRecoversResponse);
  rpc CheckUnlockPasswordBackups(CheckUnlockPasswordBackupsRequest) returns (CheckUnlockPasswordBackupsResponse);
  rpc ConfirmFamilyRecover(ConfirmFamilyRecoverRequest) returns (ConfirmFamilyRecoverResponse);
}

message ConfirmFamilyRecoverRequest {
  string uuid = 1; // @gotags: validate:"required"
}

message ConfirmFamilyRecoverResponse {
  int32 code = 1;
  string message = 2;
  google.protobuf.Value debugMessage = 3;
  string oracle = 4;
}

message CheckUnlockPasswordBackupsRequest {
  string email = 1; // @gotags: validate:"required"
}

message CheckUnlockPasswordBackupsResponse {
  int32 code = 1;
  string message = 2;
  google.protobuf.Value debugMessage = 3;
  string oracle = 4;
  message Member {
    int64 userID = 1;
    string email = 2;
  }
  message Data {
    bool nullBackup = 1;
    bool canRecover = 2;
    int64 lastRecoveredAt = 3;
    int64 nextRecoverTS = 4;
    bool canFamilyRecover = 5;
    int64 lastFamilyRecoveredAt = 6;
    int64 nextFamilyRecoverTS = 7;
    repeated Member backupMembers = 8;
  }
  Data data = 5;
}

message GetFamilyBackupRecoversRequest {
  int64 userID = 1; // @gotags: validate:"gt=0"
}

message GetFamilyBackupRecoversResponse {
  int32 code = 1;
  string message = 2;
  google.protobuf.Value debugMessage = 3;
  string oracle = 4;
  message Recover {
    int64 id = 1;
    int64 createdAt = 2;
    int64 userID = 3;
    string email = 4;
    string ciphertext = 5;
    int64 checkedAt = 6;
  }
  message Data {
    repeated Recover self = 1;
    repeated Recover family = 2;
  }
  Data data = 5;
}

message RejectFamilyRecoverRequest {
  string uuid = 1;
}

message RejectFamilyRecoverResponse {
