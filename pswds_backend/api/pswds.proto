  message SharedDataItem {
    string dataID = 1;
    int64 sharedAt = 2;
    repeated int64 sharingMembers = 3;
  }
  message Data {
    int64 updatedAt = 1;
    string passwordHash = 2;
    string pwdList = 3;
    string securityQuestions = 4;
    repeated string pwdIDList = 5;
    string nprList = 6;
    repeated string nprIDList = 7;
    string encryptedFamilyKey = 8;
    repeated ListItem sharingList = 9;
    repeated SharedDataItem sharedData = 10;
  }
  Data data = 5;
}

