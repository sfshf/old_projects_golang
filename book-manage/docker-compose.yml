version: '3'

services:
  backend:
    build: ./backend
    restart: always
    ports:
      - '9001:9001'
    container_name: book-manage-backend

  ui:
    build: ./ui
    restart: always
    ports:
      - '3000:3000'
    container_name: book-manage-ui

  nginx:
    build: ./nginx
    restart: always
    ports:
      - '80:80'
    container_name: book-manage-nginx
