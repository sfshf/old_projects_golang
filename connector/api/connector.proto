syntax = "proto3";

package connector_api;
option go_package = "./api";

import "google/protobuf/struct.proto";

service ConnectorService {
  rpc CreatePassword(CreatePasswordRequest) returns (CreatePasswordResponse);
  rpc CheckPassword(CheckPasswordRequest) returns (CheckPasswordResponse);
  rpc DeletePassword(DeletePasswordRequest) returns (DeletePasswordResponse);
  rpc CreatePrivateKey(CreatePrivateKeyRequest) returns (CreatePrivateKeyResponse);
  rpc GetPublicKey(GetPublicKeyRequest) returns (GetPublicKeyResponse);
  rpc DeletePrivateKey(DeletePrivateKeyRequest) returns (DeletePrivateKeyResponse);
  rpc SaveData(SaveDataRequest) returns (SaveDataResponse);
  rpc DeleteData(DeleteDataRequest) returns (DeleteDataResponse);
  rpc DecryptData(DecryptDataRequest) returns (DecryptDataResponse);
  rpc GetData(GetDataRequest) returns (GetDataResponse);
  rpc CheckKeyExisting(CheckKeyExistingRequest) returns (CheckKeyExistingResponse);
}

service ConnectorConsoleService {
  rpc GetLogs(GetLogsRequest) returns (GetLogsResponse);
  rpc GetMonitorInfos(GetMonitorInfosRequest) returns (GetMonitorInfosResponse);
  rpc ListConfigs(ListConfigsRequest) returns (ListConfigsResponse);
  rpc CreateConfig(CreateConfigRequest) returns (CreateConfigResponse);
  rpc UpdateConfig(UpdateConfigRequest) returns (UpdateConfigResponse);
  rpc DeleteConfig(DeleteConfigRequest) returns (DeleteConfigResponse);
  rpc ListPassword(ListPasswordRequest) returns (ListPasswordResponse);
  rpc AddPassword(AddPasswordRequest) returns (AddPasswordResponse);
  rpc RemovePassword(RemovePasswordRequest) returns (RemovePasswordResponse);
  rpc FetchPassword(FetchPasswordRequest) returns (FetchPasswordResponse);
  rpc ListPrivateKey(ListPrivateKeyRequest) returns (ListPrivateKeyResponse);
  rpc AddPrivateKey(AddPrivateKeyRequest) returns (AddPrivateKeyResponse);
  rpc RemovePrivateKey(RemovePrivateKeyRequest) returns (RemovePrivateKeyResponse);
  rpc GetAllApps(GetAllAppsRequest) returns (GetAllAppsResponse);
  rpc GetAllKeyIDs(GetAllKeyIDsRequest) returns (GetAllKeyIDsResponse);
  rpc ListApiKey(ListApiKeyRequest) returns (ListApiKeyResponse);
  rpc AddApiKey(AddApiKeyRequest) returns (AddApiKeyResponse);
  rpc RemoveApiKey(RemoveApiKeyRequest) returns (RemoveApiKeyResponse);
  rpc ValidateApiKey(ValidateApiKeyRequest) returns (ValidateApiKeyResponse);
  rpc GetManagePlatformLogs(GetManagePlatformLogsRequest) returns (GetManagePlatformLogsResponse);
}

message CreatePasswordRequest {
  string apiKey = 1; // @gotags: validate:"required"
  string keyID = 2; // @gotags: validate:"required,startswith=pswd_"
}

message CreatePasswordResponse {
  int32 code = 1;
  string message = 2;
  google.protobuf.Value debugMessage = 3;
  string oracle = 4;
  message Data {
    string password = 1;
  }
  Data data = 5;
}

message CheckPasswordRequest {
  string apiKey = 1; // @gotags: validate:"required"
  string keyID = 2; // @gotags: validate:"required,startswith=pswd_"
  string passwordHash = 3; // @gotags: validate:"required"
}

message CheckPasswordResponse {
  int32 code = 1;
  string message = 2;
  google.protobuf.Value debugMessage = 3;
  string oracle = 4;
  message Data {
    bool valid = 1;
  }
  Data data = 5;
}

message DeletePasswordRequest {
  string apiKey = 1; // @gotags: validate:"required"
  string keyID = 2; // @gotags: validate:"required,startswith=pswd_"
}

message DeletePasswordResponse {
  int32 code = 1;
  string message = 2;
  google.protobuf.Value debugMessage = 3;
  string oracle = 4;
}

message CreatePrivateKeyRequest {
  string apiKey = 1; // @gotags: validate:"required"
  string keyID = 2; // @gotags: validate:"required,startsnotwith=pswd_"
}

message CreatePrivateKeyResponse {
  int32 code = 1;
  string message = 2;
  google.protobuf.Value debugMessage = 3;
  string oracle = 4;
  message Data {
    string publicKey = 1;
  }
  Data data = 5;
}

