message Empty {
}

message EmptyResponse {
    int32 code = 1;
    string message = 2;
    google.protobuf.Value debugMessage = 3;
}

message CreatePasswordRequest {
  string apiKey = 1;
  string keyID = 2;
}

message CreatePasswordResponse {
  int32 code = 1;
  string message = 2;
  google.protobuf.Value debugMessage = 3;
  string oracle = 4;
  message Data {
    string password = 1;
  }
  Data data = 5;
}

