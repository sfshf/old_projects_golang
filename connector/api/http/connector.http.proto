syntax = "proto3";

package connector_api;

import "google/api/annotations.proto";
import "google/protobuf/struct.proto";

service ConnectorService {
  rpc CreatePassword(CreatePasswordRequest) returns (CreatePasswordResponse) {
    option (google.api.http) = {
      post: "/riki/createPassword/v1"
      body: "*"
    };
  };
  rpc CheckPassword(CheckPasswordRequest) returns (CheckPasswordResponse) {
    option (google.api.http) = {
      post: "/riki/checkPassword/v1"
      body: "*"
    };
  };
  rpc DeletePassword(DeletePasswordRequest) returns (DeletePasswordResponse) {
    option (google.api.http) = {
      post: "/riki/deletePassword/v1"
      body: "*"
    };
  };
  rpc CreatePrivateKey(CreatePrivateKeyRequest) returns (CreatePrivateKeyResponse) {
    option (google.api.http) = {
      post: "/riki/createPrivateKey/v1"
      body: "*"
    };
  };
  rpc GetPublicKey(GetPublicKeyRequest) returns (GetPublicKeyResponse) {
    option (google.api.http) = {
      post: "/riki/getPublicKey/v1"
      body: "*"
    };
  };
  rpc DeletePrivateKey(DeletePrivateKeyRequest) returns (DeletePrivateKeyResponse) {
    option (google.api.http) = {
      post: "/riki/deletePrivateKey/v1"
      body: "*"
    };
  };
  rpc SaveData(SaveDataRequest) returns (SaveDataResponse) {
    option (google.api.http) = {
      post: "/riki/saveData/v1"
      body: "*"
    };
  };
  rpc DeleteData(DeleteDataRequest) returns (DeleteDataResponse) {
    option (google.api.http) = {
      post: "/riki/deleteData/v1"
      body: "*"
    };
  };
  rpc DecryptData(DecryptDataRequest) returns (DecryptDataResponse) {
    option (google.api.http) = {
      post: "/riki/decryptData/v1"
      body: "*"
    };
  };
  rpc GetData(GetDataRequest) returns (GetDataResponse) {
    option (google.api.http) = {
      post: "/riki/getData/v1"
      body: "*"
    };
  };
  rpc CheckKeyExisting(CheckKeyExistingRequest) returns (CheckKeyExistingResponse) {
    option (google.api.http) = {
      post: "/riki/checkKeyExisting/v1"
      body: "*"
    };
  };
}

